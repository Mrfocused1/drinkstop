<!doctype html>
<html lang="en" class="antialiased">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Now — DRINK STOP</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="icon" href="wp-content/uploads/2025/10/cropped-favicon-2-192x192.webp">
<style>
@font-face{font-family:'Adieu';src:url('wp-content/themes/pley-by-ney/dist/assets/fonts/adieu-black.woff2') format('woff2'),url('wp-content/themes/pley-by-ney/dist/assets/fonts/adieu-black.woff') format('woff');font-weight:900;font-display:swap;}
:root{--green:#00ef02;--green2:#3cf02d;--cream:#fffbe6;--ink:#0a0a0a;--red:#e8202a;--blue:#1f6fd6;}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Manrope',system-ui,-apple-system,sans-serif;background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.4;}
.wrap{min-height:100%;display:flex;flex-direction:column;}
/* header */
.ohead{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;border-bottom:0;}
.ohead .logo{height:44px;width:auto;display:block}
.ohead a.back{font-weight:800;text-decoration:none;color:var(--ink);font-size:14px;letter-spacing:.02em;display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border:2px solid var(--ink);border-radius:999px;transition:.2s}
.ohead a.back:hover{background:var(--ink);color:var(--cream)}
/* progress */
.prog{padding:0 28px 8px;max-width:900px;margin:0 auto;width:100%}
.prog .bar{height:8px;background:#00000014;border-radius:999px;overflow:hidden}
.prog .bar i{display:block;height:100%;width:0;background:var(--green);border-radius:999px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.prog .lab{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;opacity:.55;margin-top:10px}
/* stage */
.stage{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:24px 24px 60px}
.step{width:100%;max-width:900px;animation:pop .4s cubic-bezier(.2,.7,.2,1)}
@keyframes pop{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.kicker{font-size:13px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--red);margin-bottom:10px}
h1.q{font-family:'Adieu','Manrope',sans-serif;font-weight:900;font-size:clamp(32px,6vw,60px);line-height:.95;letter-spacing:-.01em;text-transform:uppercase;margin-bottom:14px}
p.sub{font-size:clamp(15px,2vw,19px);opacity:.75;max-width:620px;margin-bottom:30px}
/* option cards */
.cards{display:grid;gap:18px;grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
.card{position:relative;text-align:left;background:#fff;border:3px solid var(--ink);border-radius:22px;padding:26px 24px;cursor:pointer;transition:.18s;overflow:hidden}
.card:hover{transform:translateY(-4px)}
.card .ct{font-family:'Adieu','Manrope',sans-serif;font-weight:900;text-transform:uppercase;font-size:26px;line-height:1;margin-bottom:8px}
.card .cd{font-size:15px;opacity:.72}
.card .tick{position:absolute;top:16px;right:16px;width:28px;height:28px;border-radius:50%;border:3px solid var(--ink);display:flex;align-items:center;justify-content:center;font-weight:900;opacity:0;transform:scale(.5);transition:.18s}
.card.sel{border-color:var(--green);background:#eafff0;box-shadow:0 10px 0 -4px var(--green)}
.card.sel .tick{opacity:1;transform:scale(1);background:var(--green);border-color:var(--green)}
.flav .swatch{width:44px;height:44px;border-radius:12px;margin-bottom:14px}
/* qty */
.qtyrow{display:flex;align-items:center;gap:16px;margin:8px 0 30px}
.qtybtn{width:56px;height:56px;border-radius:50%;border:3px solid var(--ink);background:#fff;font-size:26px;font-weight:900;cursor:pointer;transition:.15s}
.qtybtn:hover{background:var(--ink);color:#fff}
.qtyval{font-family:'Adieu',sans-serif;font-weight:900;font-size:44px;min-width:80px;text-align:center}
.qtyunit{opacity:.6;font-weight:700}
.qtotal{font-size:22px;font-weight:800;margin:-8px 0 26px}
.qtotal b{font-family:'Adieu',sans-serif;font-size:28px}
.qtotal span{opacity:.55;font-weight:700;font-size:16px}
/* inputs */
.field{margin-bottom:18px}
.field label{display:block;font-weight:800;font-size:14px;margin-bottom:7px}
.field input,.field textarea,.field select{width:100%;font:inherit;font-size:16px;padding:14px 16px;border:3px solid var(--ink);border-radius:14px;background:#fff}
.field textarea{min-height:120px;resize:vertical}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 4px #00ef0233}
.filedrop{border:3px dashed var(--ink);border-radius:18px;padding:26px;text-align:center;cursor:pointer;background:#fff;transition:.15s}
.filedrop:hover{background:#eafff0;border-color:var(--green)}
.filedrop.has{border-style:solid;border-color:var(--green);background:#eafff0}
.filedrop input{display:none}
.thumb{max-height:160px;border-radius:12px;margin:0 auto 10px;display:block}
/* nav buttons */
.nav{display:flex;justify-content:space-between;gap:14px;margin-top:34px;max-width:900px}
.btn{font:inherit;font-weight:800;font-size:16px;letter-spacing:.02em;padding:16px 34px;border-radius:999px;border:3px solid var(--ink);cursor:pointer;transition:.18s;text-transform:uppercase}
.btn.prev{background:transparent}
.btn.prev:hover{background:var(--ink);color:#fff}
.btn.next{background:var(--green);border-color:var(--green)}
.btn.next:hover{filter:brightness(.92);transform:translateX(3px)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;filter:none!important}
.err{color:var(--red);font-weight:700;font-size:14px;margin-top:8px;min-height:18px}
/* summary + done */
.summary{background:#fff;border:3px solid var(--ink);border-radius:20px;padding:24px 26px}
.summary .row{display:flex;justify-content:space-between;gap:16px;padding:12px 0;border-bottom:1px solid #00000012}
.summary .row:last-child{border-bottom:0}
.summary .k{font-weight:800;text-transform:uppercase;font-size:13px;letter-spacing:.06em;opacity:.6}
.summary .v{text-align:right;font-weight:700}
.done{text-align:center;padding:20px 0}
.done .big{font-family:'Adieu',sans-serif;font-weight:900;text-transform:uppercase;font-size:clamp(40px,9vw,86px);line-height:.9}
.done .check{width:96px;height:96px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;margin:0 auto 22px;font-size:52px}
.foot{text-align:center;padding:16px;font-size:12px;font-weight:700;letter-spacing:.05em;opacity:.5;text-transform:uppercase}
.pill{display:inline-block;background:var(--ink);color:var(--cream);font-weight:800;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:5px 12px;border-radius:999px;margin-bottom:14px}
</style>
</head>
<body>
<div class="wrap">
  <header class="ohead">
    <a href="index.html"><img class="logo" src="wp-content/uploads/2025/10/drinkstop-logo.png" alt="DRINK STOP"></a>
    <a class="back" href="index.html">✕ Close</a>
  </header>
  <div class="prog"><div class="bar"><i id="pbar"></i></div><div class="lab" id="plab">Step 1</div></div>
  <main class="stage"><div class="step" id="step"></div></main>
  <div class="foot">DRINK STOP · Please drink responsibly · 18+ only</div>
</div>

<script>
const FLAVOURS=[
  {id:'run',name:'Rum For Your Life',desc:'Rum, fruit punch & watermelon',color:'#e8202a'},
  {id:'suck',name:'Suck Your Rum',desc:'Rum, apple, lemon & ginger',color:'#f2b200'},
  {id:'rumba',name:'Rumbaclart 2.0',desc:'Pineapple, apple & guava',color:'#3cc24a'},
];
const PRICE=5; // £ per pouch (original)
const S={design:null, flavours:[], qty:5, occasion:'', customFlavours:[], artwork:null, artworkName:'', brief:'', designMode:null, name:'', email:'', phone:'', area:''};
let idx=0;

// build the ordered list of step-keys based on branch
function sequence(){
  const base=['intro','design'];
  if(S.design==='original') return [...base,'flavours','qty','details','review','done'];
  if(S.design==='custom')   return [...base,'occasion','customflav','qtyc','artwork','details','review','done'];
  return base;
}
const el=document.getElementById('step');
const pbar=document.getElementById('pbar'), plab=document.getElementById('plab');

function render(){
  const seq=sequence(); const key=seq[idx];
  const totalSteps = S.design ? (seq.length-1) : 6; // exclude 'done'; estimate 6 before branch chosen
  const shown = Math.min(idx+1, totalSteps);
  pbar.style.width=(key==='done'?100:(idx/totalSteps)*100)+'%';
  plab.textContent = key==='done' ? 'Done' : ('Step '+shown+' of '+totalSteps);
  el.innerHTML=STEPS[key]();
  wire(key);
  window.scrollTo({top:0,behavior:'smooth'});
}
function go(n){ idx=Math.max(0,idx+n); render(); }
function reseq(){ idx=Math.min(idx, sequence().length-1); }

function navHtml(nextLabel, canBack=true, nextId='next', nextDisabled=false){
  return `<div class="nav">
    ${canBack?`<button class="btn prev" id="prev">← Back</button>`:`<span></span>`}
    <button class="btn next" id="${nextId}" ${nextDisabled?'disabled':''}>${nextLabel}</button></div>`;
}

const STEPS={
 intro:()=>`
  <span class="pill">Order Now</span>
  <h1 class="q">Let's get<br>the party started.</h1>
  <p class="sub">Frozen rum cocktails, delivered your way. Answer a few quick questions and we'll sort your order — standard flavours or a fully custom, branded pouch.</p>
  ${navHtml('Start →', false)}`,

 design:()=>`
  <div class="kicker">Step 1 · The basics</div>
  <h1 class="q">How do you<br>want it?</h1>
  <p class="sub">Grab our classics, or put your own stamp on the pouch.</p>
  <div class="cards">
    <div class="card ${S.design==='original'?'sel':''}" data-d="original"><div class="tick">✓</div>
      <div class="ct">Original</div><div class="cd">Classic DRINK STOP pouches. Pick your flavours and go.</div></div>
    <div class="card ${S.design==='custom'?'sel':''}" data-d="custom"><div class="tick">✓</div>
      <div class="ct">Custom</div><div class="cd">Your brand, event or artwork printed on the pouch.</div></div>
  </div>
  ${navHtml('Continue →', true,'next', !S.design)}`,

 flavours:()=>`
  <div class="kicker">Original · Flavours</div>
  <h1 class="q">Pick your<br>flavours.</h1>
  <p class="sub">Choose one or more. You'll set quantities next.</p>
  <div class="cards flav">
    ${FLAVOURS.map(f=>`<div class="card ${S.flavours.includes(f.id)?'sel':''}" data-f="${f.id}"><div class="tick">✓</div>
      <div class="swatch" style="background:${f.color}"></div>
      <div class="ct">${f.name}</div><div class="cd">${f.desc} · 5% ABV</div></div>`).join('')}
  </div>
  ${navHtml('Continue →', true,'next', S.flavours.length===0)}`,

 qty:()=>`
  <div class="kicker">Original · Quantity</div>
  <h1 class="q">How many<br>pouches?</h1>
  <p class="sub">Minimum 5 pouches. Bulk & event pricing available on request.</p>
  <div class="qtyrow">
    <button class="qtybtn" data-q="-1">–</button>
    <div class="qtyval" id="qv">${S.qty}</div>
    <button class="qtybtn" data-q="1">+</button>
    <span class="qtyunit">pouches</span>
  </div>
  <div class="qtotal">Total <b id="qtotal">£${S.qty*PRICE}</b> <span>· £${PRICE} each</span></div>
  ${navHtml('Continue →')}`,

 occasion:()=>`
  <div class="kicker">Custom · The brief</div>
  <h1 class="q">What's the<br>occasion?</h1>
  <p class="sub">Tell us what these are for so we design them right.</p>
  <div class="cards">
    ${['Brand / marketing','Wedding','Festival / event','Club / bar','Just because'].map(o=>`
      <div class="card ${S.occasion===o?'sel':''}" data-o="${o}" style="padding:20px 22px"><div class="tick">✓</div><div class="ct" style="font-size:20px">${o}</div></div>`).join('')}
  </div>
  ${navHtml('Continue →', true,'next', !S.occasion)}`,

 customflav:()=>`
  <div class="kicker">Custom · What's inside</div>
  <h1 class="q">Which base<br>flavour(s)?</h1>
  <p class="sub">The pouch is yours — the rum inside is ours. Pick what goes in.</p>
  <div class="cards flav">
    ${FLAVOURS.map(f=>`<div class="card ${S.customFlavours.includes(f.id)?'sel':''}" data-cf="${f.id}"><div class="tick">✓</div>
      <div class="swatch" style="background:${f.color}"></div><div class="ct">${f.name}</div><div class="cd">${f.desc}</div></div>`).join('')}
  </div>
  ${navHtml('Continue →', true,'next', S.customFlavours.length===0)}`,

 qtyc:()=>`
  <div class="kicker">Custom · Quantity</div>
  <h1 class="q">How many<br>do you need?</h1>
  <p class="sub">Start from 5 pouches. Bigger the run, better the price.</p>
  <div class="qtyrow">
    <button class="qtybtn" data-q="-1">–</button>
    <div class="qtyval" id="qv">${S.qty<5?5:S.qty}</div>
    <button class="qtybtn" data-q="1">+</button>
    <span class="qtyunit">pouches</span>
  </div>
  <div class="qtotal">Total <b id="qtotal">£${(S.qty<5?5:S.qty)*PRICE}</b> <span>· £${PRICE} each</span></div>
  ${navHtml('Continue →')}`,

 artwork:()=>`
  <div class="kicker">Custom · The design</div>
  <h1 class="q">The artwork.</h1>
  <p class="sub">Got a design ready, or want us to make one? Either works.</p>
  <div class="cards">
    <div class="card ${S.designMode==='upload'?'sel':''}" data-dm="upload"><div class="tick">✓</div><div class="ct">I've got it</div><div class="cd">Upload your logo or full pouch artwork.</div></div>
    <div class="card ${S.designMode==='request'?'sel':''}" data-dm="request"><div class="tick">✓</div><div class="ct">Make it for me</div><div class="cd">Describe the vibe — our designers take it from there.</div></div>
  </div>
  <div id="dmpanel" style="margin-top:26px"></div>
  ${navHtml('Continue →', true,'next', true)}`,

 details:()=>`
  <div class="kicker">Almost there</div>
  <h1 class="q">Your details.</h1>
  <p class="sub">So we can confirm your order and pricing. We'll never spam you.</p>
  <div class="field"><label>Full name</label><input id="f_name" value="${S.name}" placeholder="Your name"></div>
  <div class="field"><label>Email</label><input id="f_email" type="email" value="${S.email}" placeholder="you@email.com"></div>
  <div class="field"><label>Phone (optional)</label><input id="f_phone" value="${S.phone}" placeholder="+44 …"></div>
  <div class="field"><label>Delivery area / postcode</label><input id="f_area" value="${S.area}" placeholder="e.g. London SE1"></div>
  <div class="err" id="err"></div>
  ${navHtml('Review order →')}`,

 review:()=>{
   const rows=[['Type', S.design==='custom'?'Custom design':'Original design']];
   if(S.design==='original'){ rows.push(['Flavours', S.flavours.map(id=>fname(id)).join(', ')]); rows.push(['Quantity', S.qty+' pouches']); rows.push(['Total', '£'+(S.qty*PRICE)+' (£'+PRICE+' each)']); }
   else { rows.push(['Occasion', S.occasion]); rows.push(['Base flavour(s)', S.customFlavours.map(id=>fname(id)).join(', ')]); rows.push(['Quantity', (S.qty<5?5:S.qty)+' pouches']); rows.push(['Total', '£'+((S.qty<5?5:S.qty)*PRICE)+' (£'+PRICE+' each)']);
          rows.push(['Design', S.designMode==='upload'?('Uploaded: '+(S.artworkName||'file')):'Design requested']);
          if(S.designMode==='request'&&S.brief) rows.push(['Brief', S.brief]); }
   rows.push(['Name', S.name]); rows.push(['Email', S.email]);
   if(S.phone) rows.push(['Phone', S.phone]); if(S.area) rows.push(['Delivery', S.area]);
   return `<div class="kicker">Final check</div><h1 class="q">Look good?</h1>
   <p class="sub">Confirm and we'll get straight back to you with pricing and next steps.</p>
   <div class="summary">${rows.map(r=>`<div class="row"><span class="k">${r[0]}</span><span class="v">${esc(r[1])}</span></div>`).join('')}</div>
   ${navHtml('Place order ✓','true','place')}`;
 },

 done:()=>{
   const body=encodeURIComponent(orderText());
   return `<div class="done">
     <div class="check">✓</div>
     <div class="big">Order in.</div>
     <p class="sub" style="margin:18px auto 26px">Nice one, ${esc(S.name.split(' ')[0]||'')}. Your order's with the DRINK STOP crew — we'll email <b>${esc(S.email)}</b> shortly with pricing${S.designMode==='request'?' and a first design concept':''}.</p>
     <div class="nav" style="justify-content:center;margin-top:0">
       <a class="btn next" style="text-decoration:none;text-align:center" href="mailto:hello@drinkstop.co.uk?subject=DRINK%20STOP%20Order&body=${body}">Email us a copy →</a>
       <a class="btn prev" style="text-decoration:none;text-align:center" href="index.html">Back to site</a>
     </div></div>`;
 }
};

function fname(id){const f=FLAVOURS.find(x=>x.id===id);return f?f.name:id;}
function esc(s){return (''+s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function orderText(){
  let t='DRINK STOP order\n\nType: '+(S.design==='custom'?'Custom design':'Original design')+'\n';
  if(S.design==='original'){t+='Flavours: '+S.flavours.map(fname).join(', ')+'\nQuantity: '+S.qty+' pouches\nTotal: £'+(S.qty*PRICE)+' (£'+PRICE+' each)\n';}
  else{t+='Occasion: '+S.occasion+'\nBase flavours: '+S.customFlavours.map(fname).join(', ')+'\nQuantity: '+(S.qty<5?5:S.qty)+' pouches\nTotal: £'+((S.qty<5?5:S.qty)*PRICE)+' (£'+PRICE+' each)\nDesign: '+(S.designMode==='upload'?'Artwork uploaded ('+(S.artworkName||'file')+')':'Requested — brief: '+S.brief)+'\n';}
  t+='\nName: '+S.name+'\nEmail: '+S.email+(S.phone?'\nPhone: '+S.phone:'')+(S.area?'\nDelivery: '+S.area:'');
  return t;
}
function dmPanel(){
  const p=document.getElementById('dmpanel'); if(!p)return;
  if(S.designMode==='upload'){
    p.innerHTML=`<div class="filedrop ${S.artwork?'has':''}" id="drop">
      ${S.artwork?`<img class="thumb" src="${S.artwork}"><div style="font-weight:800">${esc(S.artworkName)}</div><div style="opacity:.6;font-size:13px">Tap to replace</div>`
      :`<div style="font-size:34px">⬆️</div><div style="font-weight:800;margin-top:6px">Upload your artwork</div><div style="opacity:.6;font-size:13px">PNG, JPG, SVG or PDF</div>`}
      <input type="file" id="file" accept="image/*,.pdf,.svg"></div>`;
    const drop=document.getElementById('drop'), file=document.getElementById('file');
    drop.onclick=()=>file.click();
    file.onchange=e=>{const f=e.target.files[0]; if(!f)return; S.artworkName=f.name;
      if(f.type.startsWith('image/')){const r=new FileReader();r.onload=ev=>{S.artwork=ev.target.result;dmPanel();updateNext();};r.readAsDataURL(f);}
      else{S.artwork='';dmPanel();updateNext();}};
  }else if(S.designMode==='request'){
    p.innerHTML=`<div class="field"><label>Describe your design</label><textarea id="brief" placeholder="Colours, logo, vibe, event name, references… the more the better.">${esc(S.brief)}</textarea></div>`;
    document.getElementById('brief').oninput=e=>{S.brief=e.target.value;updateNext();};
  }else p.innerHTML='';
}
function artworkValid(){ return S.designMode==='upload' ? (!!S.artwork||!!S.artworkName) : S.designMode==='request' ? S.brief.trim().length>3 : false; }
function updateNext(){ const n=document.getElementById('next'); if(n && sequence()[idx]==='artwork') n.disabled=!artworkValid(); }

function wire(key){
  const prev=document.getElementById('prev'); if(prev) prev.onclick=()=>go(-1);
  const next=document.getElementById('next'); if(next) next.onclick=()=>{ if(!validate(key))return; go(1); };
  if(key==='design') el.querySelectorAll('[data-d]').forEach(c=>c.onclick=()=>{S.design=c.dataset.d; S.qty=5; reseq();render();});
  if(key==='flavours') el.querySelectorAll('[data-f]').forEach(c=>c.onclick=()=>{toggle(S.flavours,c.dataset.f);render();});
  if(key==='customflav') el.querySelectorAll('[data-cf]').forEach(c=>c.onclick=()=>{toggle(S.customFlavours,c.dataset.cf);render();});
  if(key==='occasion') el.querySelectorAll('[data-o]').forEach(c=>c.onclick=()=>{S.occasion=c.dataset.o;render();});
  if(key==='qty'||key==='qtyc'){el.querySelectorAll('[data-q]').forEach(b=>b.onclick=()=>{const min=5,step=parseInt(b.dataset.q); S.qty=Math.max(min,(S.qty<min?min:S.qty)+step); document.getElementById('qv').textContent=S.qty; const qt=document.getElementById('qtotal'); if(qt)qt.textContent='£'+(S.qty*PRICE);});}
  if(key==='artwork'){el.querySelectorAll('[data-dm]').forEach(c=>c.onclick=()=>{S.designMode=c.dataset.dm;render();}); dmPanel(); updateNext();}
  if(key==='details'){['name','email','phone','area'].forEach(k=>{const i=document.getElementById('f_'+k); if(i)i.oninput=e=>S[k]=e.target.value;});}
  if(key==='review'){const pl=document.getElementById('place'); if(pl)pl.onclick=()=>go(1);}
}
function toggle(arr,v){const i=arr.indexOf(v); if(i<0)arr.push(v); else arr.splice(i,1);}
function validate(key){
  if(key==='details'){const err=document.getElementById('err');
    if(!S.name.trim()){err.textContent='Pop your name in.';return false;}
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(S.email)){err.textContent='Need a valid email to confirm.';return false;}
    err.textContent='';}
  if(key==='artwork') return artworkValid();
  return true;
}
render();
</script>
</body>
</html>
